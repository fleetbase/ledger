[currency-kudos]
ENABLED = YES
name = "Kudos (Fleetbase Local Taler Test)"
code = "KUDOS"
fractional_input_digits = 2
fractional_normal_digits = 2
fractional_trailing_zero_digits = 2
alt_unit_names = {"0":"KUDOS"}
common_amounts = "KUDOS:0.50 KUDOS:1 KUDOS:5"

[merchant]
CURRENCY = KUDOS
SERVE = tcp
PORT = 9966
BIND_TO = 0.0.0.0
BASE_URL = http://taler-merchant.lvh.me:9966/
DATABASE = postgres
DB = postgres
ENABLE_SELF_PROVISIONING = YES

[merchantdb-postgres]
CONFIG = postgres://taler_merchant:taler_merchant@taler-merchant-db:5432/taler_merchant
SQL_DIR = /usr/share/taler-merchant/sql/

[merchant-exchange-kudos]
EXCHANGE_BASE_URL = http://taler-exchange.lvh.me:8081/
MASTER_KEY = SET_BY_BOOTSTRAP
CURRENCY = KUDOS
