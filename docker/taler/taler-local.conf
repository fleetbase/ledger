[PATHS]
TALER_HOME = /var/lib/fleetbase-ledger/taler
TALER_DATA_HOME = /var/lib/fleetbase-ledger/taler/data/
TALER_CONFIG_HOME = /var/lib/fleetbase-ledger/taler/config/
TALER_CACHE_HOME = /var/lib/fleetbase-ledger/taler/cache/
TALER_RUNTIME_DIR = /var/lib/fleetbase-ledger/taler/run/
TALER_TMP = /var/lib/fleetbase-ledger/taler/tmp/

[libeufin-bank]
CURRENCY = KUDOS
WIRE_TYPE = x-taler-bank
BASE_URL = http://taler-bank.lvh.me:8082/
X_TALER_BANK_PAYTO_HOSTNAME = taler-bank.lvh.me
NAME = "Fleetbase Ledger Taler Test Bank"
REGISTRATION_BONUS = KUDOS:100
DEFAULT_DEBT_LIMIT = KUDOS:999999
ALLOW_REGISTRATION = yes
ALLOW_ACCOUNT_DELETION = yes
ALLOW_EDIT_NAME = yes
ALLOW_EDIT_CASHOUT_PAYTO_URI = yes
PWD_HASH_ALGORITHM = bcrypt
PWD_HASH_CONFIG = { "cost": 4 }
PWD_AUTH_COMPAT = yes
PWD_CHECK = no
SERVE = tcp
PORT = 8082
BIND_TO = 0.0.0.0
SUGGESTED_WITHDRAWAL_EXCHANGE = http://taler-exchange.lvh.me:8081/

[libeufin-bankdb-postgres]
CONFIG = jdbc:postgresql://taler-merchant-db:5432/taler_bank?user=taler_merchant&password=taler_merchant

[exchange]
CURRENCY = KUDOS
CURRENCY_ROUND_UNIT = KUDOS:0.01
CURRENCY_FRACTION_DIGITS = 2
TINY_AMOUNT = KUDOS:0.01
STEFAN_ABS = KUDOS:1
STEFAN_LOG = KUDOS:1
STEFAN_LIN = 0.0
ATTRIBUTE_ENCRYPTION_KEY = 0123456789012345678901234567890123456789012345678901
ENABLE_KYC = NO
DISABLE_DIRECT_DEPOSIT = NO
DB = postgres
SERVE = tcp
PORT = 8081
BIND_TO = 0.0.0.0
BASE_URL = http://taler-exchange.lvh.me:8081/
MAX_KEYS_CACHING = forever
WIREWATCH_IDLE_SLEEP_INTERVAL = 1 s
TRANSFER_IDLE_SLEEP_INTERVAL = 1 s
AGGREGATOR_IDLE_SLEEP_INTERVAL = 1 s
AGGREGATOR_SHIFT = 1 s
SIGNKEY_LEGAL_DURATION = 2 years
MASTER_PUBLIC_KEY = SET_BY_BOOTSTRAP

[exchange-offline]
MASTER_PRIV_FILE = /var/lib/fleetbase-ledger/taler/data/exchange/offline/master.priv

[exchangedb-postgres]
CONFIG = postgres://taler_merchant:taler_merchant@taler-merchant-db:5432/taler_exchange
SQL_DIR = /usr/share/taler-exchange/sql/

[exchange-account-1]
PAYTO_URI = payto://x-taler-bank/taler-bank.lvh.me/exchange?receiver-name=Fleetbase%20Local%20Exchange
WIRE_RESPONSE = /var/lib/fleetbase-ledger/taler/data/exchange/account-1.json
ENABLE_CREDIT = YES
ENABLE_DEBIT = YES

[exchange-accountcredentials-1]
WIRE_GATEWAY_URL = http://taler-bank.lvh.me:8082/accounts/exchange/taler-wire-gateway/
WIRE_GATEWAY_AUTH_METHOD = basic
USERNAME = exchange
PASSWORD = fleetbase-exchange-bank-password

[taler-exchange-secmod-eddsa]
LOOKAHEAD_SIGN = 20 s
KEY_DIR = /var/lib/fleetbase-ledger/taler/data/exchange/secmod-eddsa/keys
UNIXPATH = /var/lib/fleetbase-ledger/taler/run/secmod-eddsa/server.sock
CLIENT_DIR = /var/lib/fleetbase-ledger/taler/run/secmod-eddsa/clients
SM_PRIV_KEY = /var/lib/fleetbase-ledger/taler/data/exchange/secmod-eddsa/secmod-private-key
DURATION = 12 weeks

[taler-exchange-secmod-rsa]
LOOKAHEAD_SIGN = 20 s
KEY_DIR = /var/lib/fleetbase-ledger/taler/data/exchange/secmod-rsa/keys
UNIXPATH = /var/lib/fleetbase-ledger/taler/run/secmod-rsa/server.sock
CLIENT_DIR = /var/lib/fleetbase-ledger/taler/run/secmod-rsa/clients
SM_PRIV_KEY = /var/lib/fleetbase-ledger/taler/data/exchange/secmod-rsa/secmod-private-key
OVERLAP_DURATION = 0 m

[taler-exchange-secmod-cs]
LOOKAHEAD_SIGN = 20 s
KEY_DIR = /var/lib/fleetbase-ledger/taler/data/exchange/secmod-cs/keys
UNIXPATH = /var/lib/fleetbase-ledger/taler/run/secmod-cs/server.sock
CLIENT_DIR = /var/lib/fleetbase-ledger/taler/run/secmod-cs/clients
SM_PRIV_KEY = /var/lib/fleetbase-ledger/taler/data/exchange/secmod-cs/secmod-private-key
OVERLAP_DURATION = 5 m

[coin_kudos_ct_1]
CIPHER = RSA
